services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: osb
      POSTGRES_PASSWORD: osb
      POSTGRES_DB: osb_vk
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osb -d osb_vk"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  longpoll:
    image: vk-osb-miniapp-app
    env_file:
      - .env
    command: python -m app.longpoll_worker
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_healthy

volumes:
  pg_data:
